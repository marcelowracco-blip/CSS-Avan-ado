<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos Flutuantes</title>

    <style>
        body{
            border: 1px solid red;

        }

        .caixa{
            background-color: red;
            width: 180px;
            height: 180px;
            border: 3px solid purple;
            margin: 0.3em;
        }

        .esquerdo{
            float: left;
            width: 100px;
            height: 100px;
            background-color: blue;
        }

        .direito{
            float: right;
            width: 100px;
            height: 100px;
            background-color: rgb(250, 45, 45);
        }
    </style>

</head>
<body>
    <div class="caixa esquerdo">
        caixa 1
    </div>

    <div class="caixa esquerdo">
        caixa 2
    </div>

    <div class="caixa esquerdo">
        caixa 3
    </div>

    <div class="caixa direito">
        caixa 1
    </div>

    <div class="caixa direito">
        caixa 2
    </div>

    <div class="caixa direito">
        caixa 3
    </div>
    
</body>
</html>
